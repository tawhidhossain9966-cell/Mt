<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT Shop - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 py-10">

    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8 space-y-6">
            <div class="flex justify-between items-center border-b pb-4">
                <h2 class="text-2xl font-bold text-purple-700">MT Shop গোপন অ্যাডমিন প্যানেল</h2>
                <button onclick="logout()" class="bg-red-500 text-white text-sm px-4 py-2 rounded-lg hover:bg-red-600">লগআউট</button>
            </div>

            <form id="admin-form" class="space-y-5">
                <!-- Site Title Management -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">সাইটের নাম (Header Title)</label>
                    <input type="text" id="admin-site-name" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-500">
                </div>

                <!-- Product Image Link -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">প্রোডাক্ট ছবির লিংক (URL)</label>
                    <input type="text" id="admin-prod-img" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-500" placeholder="https://example.com/image.jpg">
                </div>

                <!-- Product Code -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">প্রোডাক্ট কোড</label>
                    <input type="text" id="admin-prod-code" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-500">
                </div>

                <!-- Product Description HTML -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">প্রোডাক্ট ডেসক্রিপশন (HTML ফরম্যাট সাপোর্ট করবে)</label>
                    <textarea id="admin-prod-desc" rows="8" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-500 font-mono text-sm"></textarea>
                </div>

                <!-- Save Button -->
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-md transition">
                    তথ্য আপডেট করুন
                </button>
            </form>
        </div>
    </div>

    <script>
        // Security check on load
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            alert('অনুগ্রহ করে প্রথমে লগইন করুন।');
            window.location.href = 'index.html';
        }

        // Populate Form Fields with current data
        document.getElementById('admin-site-name').value = localStorage.getItem('siteName') || 'MT Shop';
        document.getElementById('admin-prod-img').value = localStorage.getItem('prodImg') || 'https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?q=80&w=600';
        document.getElementById('admin-prod-code').value = localStorage.getItem('prodCode') || '3640';
        
        // Default description template
        const defaultDesc = `🎨 আপনার সোনামণির সৃজনশীলতা বাড়াতে দারুণ একটি উপহার! 🎁 Little Hands Drawing Projector Table 🖍<br><br>বাচ্চারা কি সারাদিন মোবাইল নিয়ে পড়ে থাকে? খেলার ছলে তাদের ছবি আঁকা শেখাতে ও মেধা বিকাশে নিয়ে নিন এই চমৎকার "Trace and Draw Projector Toy"! এটি আপনার ছোট্ট সোনামণিকে পরিণত করবে দারুণ এক শিল্পীতে! 🌟<br><br>✨ কেন এই ড্রয়িং প্রজেক্টরটি আপনার শিশুর জন্য সেরা?<br>🔹 মজার ও সহজ ড্রয়িং: প্রজেক্টরটি চালু করে স্লাইড বসালেই নিচে চমৎকার সব ছবি ফুটে উঠবে। সেই আলো দেখে দেখে বাচ্চারা খুব সহজেই ট্রেস করতে ও রঙ করতে পারবে।<br>🔹 মেধা বিকাশ: এটি শিশুদের কল্পনাশক্তি, সৃজনশীলতা, রঙ চেনার ক্ষমতা এবং 'হ্যান্ড-আই কোঅর্ডিনেশন' দারুণভাবে বাড়িয়ে তুলবে।<br>🔹 ১০০% নিরাপদ উপাদান: উন্নতমানের ও টেকসই ABS প্লাস্টিক দিয়ে তৈরি, যার প্রান্তগুলো একদম মসৃণ। এর সাথে থাকা কালার পেনগুলো সম্পূর্ণ বিষমুক্ত (Non-toxic), তাই বাচ্চাদের জন্য একদম নিরাপদ।<br>🔹 পারফেক্ট গিফট: জন্মদিন, ঈদ বা যেকোনো বিশেষ দিনে ৩ বছর বা তার বেশি বয়সী শিশুদের চমকে দেওয়ার মতো একটি উপহার!<br><br>📏 পণ্যের সাইজ: ২৫ x ০.০৩ x ৩৫.৫ সেমি।<br><br>আপনার শিশুর শৈশব হোক আরও রঙিন ও আনন্দময়! আজই আপনার ছোট্ট শিল্পীর হাতে তুলে দিন এই দারুণ খেলনাটি।`;
        
        document.getElementById('admin-prod-desc').value = localStorage.getItem('prodDesc') || defaultDesc;

        // Handle Save Form
        document.getElementById('admin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('siteName', document.getElementById('admin-site-name').value);
            localStorage.setItem('prodImg', document.getElementById('admin-prod-img').value);
            localStorage.setItem('prodCode', document.getElementById('admin-prod-code').value);
            localStorage.setItem('prodDesc', document.getElementById('admin-prod-desc').value);
            alert('সব তথ্য সফলভাবে আপডেট হয়েছে!');
            window.location.href = 'index.html';
        });

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'index.html';
        }
    </script>
</body>
  </html>
