<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MT Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 py-8">

    <div class="container mx-auto px-4 max-w-xl">
        <div class="bg-white rounded-3xl shadow-xl p-6 space-y-6 border border-slate-100">
            <div class="flex justify-between items-center border-b pb-4">
                <h2 class="text-xl font-black text-slate-900">MT Shop অ্যাডমিন প্যানেল</h2>
                <button onclick="logout()" class="bg-rose-500 text-white text-xs font-bold px-3 py-2 rounded-xl hover:bg-rose-600">লগআউট</button>
            </div>

            <form id="admin-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">সাইটের নাম (Header Title)</label>
                    <input type="text" id="admin-site-name" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-purple-500">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">পূর্বের মূল্য (৳)</label>
                        <input type="number" id="admin-old-price" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">আজকের অফার মূল্য (৳)</label>
                        <input type="number" id="admin-new-price" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-purple-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">প্রোডাক্ট ছবির লিংক (URL)</label>
                    <input type="text" id="admin-prod-img" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">প্রোডাক্ট কোড</label>
                    <input type="text" id="admin-prod-code" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">প্রোডাক্ট ডেসক্রিপশন</label>
                    <textarea id="admin-prod-desc" rows="6" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-purple-500 font-sans"></textarea>
                </div>

                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3.5 rounded-xl shadow-md transition text-sm">
                    সব তথ্য আপডেট করুন
                </button>
            </form>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            alert('अनुग्रह करे पहिले लॉगिन करुन।');
            window.location.href = 'index.html';
        }

        document.getElementById('admin-site-name').value = localStorage.getItem('siteName') || 'MT Shop';
        document.getElementById('admin-old-price').value = localStorage.getItem('oldPrice') || '1200';
        document.getElementById('admin-new-price').value = localStorage.getItem('newPrice') || '750';
        document.getElementById('admin-prod-img').value = localStorage.getItem('prodImg') || 'https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?q=80&w=600';
        document.getElementById('admin-prod-code').value = localStorage.getItem('prodCode') || '3640';
        document.getElementById('admin-prod-desc').value = localStorage.getItem('prodDesc') || '';

        document.getElementById('admin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('siteName', document.getElementById('admin-site-name').value);
            localStorage.setItem('oldPrice', document.getElementById('admin-old-price').value);
            localStorage.setItem('newPrice', document.getElementById('admin-new-price').value);
            localStorage.setItem('prodImg', document.getElementById('admin-prod-img').value);
            localStorage.setItem('prodCode', document.getElementById('admin-prod-code').value);
            localStorage.setItem('prodDesc', document.getElementById('admin-prod-desc').value);
            alert('সব তথ্য সফলভাবে আপডেট হয়েছে!');
            window.location.href = 'index.html';
        });

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'index.html';
        }
    </script>
</body>
  </html>
